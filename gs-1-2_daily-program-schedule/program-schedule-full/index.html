<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, initial-scale=0.6667, minimum-scale=0.6667, maximum-scale=0.6667, user-scalable=no" />
  <title>VAQ Program Schedule Full</title>

<!--
  Target container: 1920 x 810 px
  Scale fix applied for Kuusoft environment rendering oversized.
  Shared asset path note:
  This page uses the repo-level ../assets/ folder for common fonts and imagery.
  Update these paths if the hosted folder structure changes later.
-->

  <style>
    @font-face {
      font-display: swap;
      font-family: 'BlissPro';
      font-style: normal;
      font-weight: 700;
      src:
        url('../assets/BlissPro-Bold.woff2') format('woff2'),
        url('../assets/BlissPro-Bold.woff') format('woff');
    }

    @font-face {
      font-display: swap;
      font-family: 'BlissPro';
      font-style: italic;
      font-weight: 400;
      src:
        url('../assets/BlissPro-Italic.woff2') format('woff2'),
        url('../assets/BlissPro-Italic.woff') format('woff');
    }

    :root {
      --page-width: 1920px;
      --page-height: 810px;

      --outer-padding-x: 20px;
      --outer-padding-y: 20px;

      --tile-width: 930px;
      --tile-height: 138px;

      --border-radius: 13px;
      --inner-stroke: rgba(255, 255, 255, 0.10);
      --divider-color: rgba(0, 0, 0, 0.10);

      --icon-column-width: 154px;
      --icon-max-width: 154px;
      --icon-max-height: 95px;

      --tile-opacity: 0.80;

      --title-color: rgba(255, 255, 255, 0.98);
      --meta-color: rgba(255, 255, 255, 0.92);
      --description-color: rgba(255, 255, 255, 0.94);

      --active-title-color: #fff7b2;
      --active-meta-color: #fff4a3;
      --active-description-color: #fff8c9;

      --page-fallback: #113466;
      --status-bg: rgba(0, 0, 0, 0.22);
      --status-text: #ffffff;

      --page-fade-duration: 450ms;
      --line-fade-duration: 380ms;
      --meta-hold-ms: 3200;
      --desc-hold-ms: 3200;
      --page-rotation-ms: 9000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: var(--page-width);
      height: var(--page-height);
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--page-fallback);
    }

    body {
      position: relative;
      font-family: 'BlissPro', Arial, sans-serif;
      color: #fff;
    }

    .page {
      position: relative;
      width: var(--page-width);
      height: var(--page-height);
      overflow: hidden;
      background: var(--page-fallback);
    }

    .bg-rotator {
      position: absolute;
      width: 5000px;
      height: 5000px;
      top: -2095px;
      left: -1732px;
      background-image: url('../assets/RotCircAnim_5000x5000.jpg');
      background-repeat: no-repeat;
      background-size: 5000px 5000px;
      transform-origin: center center;
      animation: slowRotate 200s linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    .content-layer {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      padding: var(--outer-padding-y) var(--outer-padding-x);
    }

    .status-panel {
      position: absolute;
      inset: 20px;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      border-radius: 18px;
      background: var(--status-bg);
      color: var(--status-text);
      font-size: 40px;
      font-weight: 700;
      line-height: 1.15;
    }

    .status-panel[hidden],
    .grid[hidden] {
      display: none !important;
    }

    .grid {
      position: relative;
      width: 100%;
      height: 100%;
      opacity: 1;
      transition: opacity var(--page-fade-duration) ease;
    }

    .grid.is-fading {
      opacity: 0;
    }

    .program-tile {
      position: absolute;
      width: var(--tile-width);
      height: var(--tile-height);
      border-radius: var(--border-radius);
      overflow: hidden;
      display: grid;
      grid-template-columns: var(--icon-column-width) 1fr;
      box-shadow:
        inset 0 0 0 8px var(--inner-stroke),
        0 8px 18px rgba(0, 0, 0, 0.16);
      opacity: 0;
      transform: translateY(8px);
      animation: tileEnter 380ms ease-out forwards;
    }

    .program-tile::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.25) 0%,
          rgba(0, 0, 0, 0.12) 18%,
          rgba(0, 0, 0, 0.00) 42%
        );
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: multiply;
    }

    .program-tile.active {
      box-shadow:
        inset 0 0 0 8px rgba(255, 255, 255, 0.18),
        0 10px 26px rgba(0, 0, 0, 0.22);
    }

    .program-icon {
      position: relative;
      z-index: 2;
      width: var(--icon-column-width);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 12px;
      border-right: 2px solid var(--divider-color);
    }

    .program-icon img {
      display: block;
      max-width: var(--icon-max-width);
      max-height: var(--icon-max-height);
      width: auto;
      height: auto;
      transform-origin: center center;
    }

    .program-tile.active .program-icon img {
      animation: activeIconPulse 3.4s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(0, 0, 0, 0.10));
    }

    .program-content {
      position: relative;
      z-index: 2;
      min-width: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 12px 24px 12px 22px;
    }

    .program-title {
      font-size: 35px;
      font-weight: 700;
      line-height: 1.08;
      color: var(--title-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: -2px;
      margin-bottom: 6px;
      padding-bottom: 4px;
    }

    .program-tile.active .program-title {
      color: var(--active-title-color);
    }

    .program-line-slot {
      position: relative;
      height: 34px;
      min-height: 34px;
      overflow: hidden;
    }

    .program-meta,
    .program-description {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      font-size: 28px;
      font-style: italic;
      font-weight: 400;
      line-height: 1.12;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transform: translateY(4px);
      transition:
        opacity var(--line-fade-duration) ease,
        transform var(--line-fade-duration) ease;
      pointer-events: none;
    }

    .program-meta {
      color: var(--meta-color);
    }

    .program-description {
      color: var(--description-color);
      font-size: 23px;
      line-height: 1.18;
    }

    .program-tile.active .program-meta {
      color: var(--active-meta-color);
    }

    .program-tile.active .program-description {
      color: var(--active-description-color);
    }

    .program-line-slot.show-meta .program-meta {
      opacity: 1;
      transform: translateY(0);
    }

    .program-line-slot.show-description .program-description {
      opacity: 1;
      transform: translateY(0);
    }

    .tile-debug {
      position: absolute;
      right: 12px;
      bottom: 10px;
      font-size: 14px;
      line-height: 1;
      opacity: 0.22;
      pointer-events: none;
      z-index: 2;
      display: none;
    }

    @keyframes slowRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes activeIconPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes tileEnter {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="bg-rotator" aria-hidden="true"></div>

    <div class="content-layer">
      <div id="status-panel" class="status-panel" hidden></div>
      <div id="grid" class="grid" hidden></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://csxuuwbtxgdpvskggcux.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_jPeweysUr7DZvFxG7F1-LQ_UR8MT1F9';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const PAGE_SIZE = 10;
    const LEFT_COLUMN_COUNT = 5;
    const TIMEZONE_NAME = 'America/Vancouver';
    const TILE_OPACITY = 0.80;

    const META_HOLD_MS = 3200;
    const DESC_HOLD_MS = 3200;

    const TRANSITION_DURATION_MS = 520;
    const BOUNDARY_FUDGE_MS = 250;

    const LAYOUT = {
      leftX: 0,
      rightX: 950,
      startY: 0,
      rowStep: 156
    };

    const state = {
      locationStyles: [],
      liveSchedule: null,
      allEntries: [],
      visibleEntries: [],
      tileElementsById: new Map(),
      transitionTimerId: null,
      lineTimerIds: []
    };

    const statusPanel = document.getElementById('status-panel');
    const grid = document.getElementById('grid');

    function clearLineTimers() {
      state.lineTimerIds.forEach((id) => clearTimeout(id));
      state.lineTimerIds = [];
    }

    function clearTransitionTimer() {
      if (state.transitionTimerId) {
        clearTimeout(state.transitionTimerId);
        state.transitionTimerId = null;
      }
    }

    function showStatus(message) {
      clearLineTimers();
      clearTransitionTimer();
      statusPanel.hidden = false;
      statusPanel.textContent = message;
      grid.hidden = true;
      grid.innerHTML = '';
      state.tileElementsById.clear();
    }

    function showGrid() {
      statusPanel.hidden = true;
      grid.hidden = false;
    }

    function getTodayInVancouver() {
      const formatter = new Intl.DateTimeFormat('en-CA', {
        timeZone: TIMEZONE_NAME,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      });
      return formatter.format(new Date());
    }

    function getCurrentVancouverParts() {
      const formatter = new Intl.DateTimeFormat('en-CA', {
        timeZone: TIMEZONE_NAME,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });

      const parts = formatter.formatToParts(new Date());

      const get = (type) => parts.find((p) => p.type === type)?.value ?? '00';

      return {
        year: Number(get('year')),
        month: Number(get('month')),
        day: Number(get('day')),
        hour: Number(get('hour')),
        minute: Number(get('minute')),
        second: Number(get('second'))
      };
    }

    function getCurrentMinutesInVancouver() {
      const parts = getCurrentVancouverParts();
      return (parts.hour * 60) + parts.minute;
    }

    function getMillisecondsUntilVancouverMinute(targetMinutes) {
      const now = getCurrentVancouverParts();
      const currentMinutes = (now.hour * 60) + now.minute;

      let deltaMinutes = targetMinutes - currentMinutes;
      if (deltaMinutes < 0) {
        deltaMinutes += 24 * 60;
      }

      const secondsRemainingInCurrentMinute = 60 - now.second;
      let totalMs = 0;

      if (deltaMinutes === 0) {
        totalMs = secondsRemainingInCurrentMinute * 1000;
      } else {
        totalMs =
          (secondsRemainingInCurrentMinute * 1000) +
          ((deltaMinutes - 1) * 60 * 1000);
      }

      return totalMs;
    }

    function formatTime12Hour(hhmm) {
      if (!hhmm || !/^\d{2}:\d{2}$/.test(hhmm)) return '';

      const [rawHours, rawMinutes] = hhmm.split(':').map(Number);
      const suffix = rawHours >= 12 ? 'p.m.' : 'a.m.';
      const hour12 = rawHours % 12 === 0 ? 12 : rawHours % 12;
      const minutes = String(rawMinutes).padStart(2, '0');

      return `${hour12}:${minutes} ${suffix}`;
    }

    function parseTimeToMinutes(timeString) {
      if (!timeString || !/^\d{2}:\d{2}$/.test(timeString)) return null;

      const [hours, minutes] = timeString.split(':').map(Number);

      if (
        Number.isNaN(hours) ||
        Number.isNaN(minutes) ||
        hours < 0 || hours > 23 ||
        minutes < 0 || minutes > 59
      ) {
        return null;
      }

      return (hours * 60) + minutes;
    }

    function normalizeHexColor(hex) {
      if (!hex) return '';
      const trimmed = String(hex).trim();
      return /^#[0-9a-fA-F]{6}$/.test(trimmed) ? trimmed : '';
    }

    function hexToRgba(hex, alpha) {
      const normalized = normalizeHexColor(hex);
      if (!normalized) {
        return `rgba(68, 102, 136, ${alpha})`;
      }

      const r = parseInt(normalized.slice(1, 3), 16);
      const g = parseInt(normalized.slice(3, 5), 16);
      const b = parseInt(normalized.slice(5, 7), 16);

      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function buildLocationMap(locationStyles) {
      const map = {};
      for (const item of locationStyles) {
        map[item.location_key] = item;
      }
      return map;
    }

    function buildIconPath(locationStyle) {
      if (!locationStyle) return '';
      const key = String(locationStyle.location_key || '').trim();
      if (!key) return '';
      return `./assets/icons/${key}.svg`;
    }

    async function loadLocationStyles() {
      const { data, error } = await supabaseClient
        .from('program_location_styles')
        .select('*')
        .eq('is_active', true)
        .order('sort_order', { ascending: true });

      return { data, error };
    }

    async function loadLiveScheduleForDate(scheduleDate) {
      const { data, error } = await supabaseClient
        .from('program_schedule_sets')
        .select('*')
        .eq('schedule_date', scheduleDate)
        .eq('mode', 'live')
        .maybeSingle();

      return { data, error };
    }

    function prepareRenderableEntries(entries, locationStyles) {
      const locationMap = buildLocationMap(locationStyles);

      return (Array.isArray(entries) ? entries : [])
        .filter((entry) => !entry.is_cancelled)
        .map((entry) => {
          const location = locationMap[entry.location_key] || null;
          const startMinutes = parseTimeToMinutes(entry.start_time);
          const endMinutes = parseTimeToMinutes(entry.end_time);
          const nowMinutes = getCurrentMinutesInVancouver();
          const descriptionText = String(entry.description || '').trim();

          return {
            id: entry.id || '',
            title: entry.title || '',
            start_time: entry.start_time || '',
            end_time: entry.end_time || '',
            start_minutes: startMinutes,
            end_minutes: endMinutes,
            description: descriptionText,
            location_key: entry.location_key || '',
            location_name: location?.display_name || entry.location_key || 'Unknown location',
            icon_path: buildIconPath(location),
            hex_color: normalizeHexColor(location?.hex_color) || '#446688',
            is_active:
              startMinutes !== null &&
              endMinutes !== null &&
              nowMinutes >= startMinutes &&
              nowMinutes < endMinutes
          };
        })
        .sort((a, b) => {
          if (a.start_minutes === null && b.start_minutes === null) return 0;
          if (a.start_minutes === null) return 1;
          if (b.start_minutes === null) return -1;
          if (a.start_minutes !== b.start_minutes) return a.start_minutes - b.start_minutes;

          if (a.end_minutes === null && b.end_minutes === null) return 0;
          if (a.end_minutes === null) return 1;
          if (b.end_minutes === null) return -1;
          return a.end_minutes - b.end_minutes;
        });
    }

    function getVisibleEntries(entries, nowMinutes) {
      return entries
        .filter((entry) => entry.end_minutes === null || entry.end_minutes > nowMinutes)
        .slice(0, PAGE_SIZE)
        .map((entry) => ({
          ...entry,
          is_active:
            entry.start_minutes !== null &&
            entry.end_minutes !== null &&
            nowMinutes >= entry.start_minutes &&
            nowMinutes < entry.end_minutes
        }));
    }

    function getNextBoundaryMinutes(visibleEntries, nowMinutes) {
      const candidates = visibleEntries
        .map((entry) => entry.end_minutes)
        .filter((minutes) => minutes !== null && minutes > nowMinutes)
        .sort((a, b) => a - b);

      return candidates[0] ?? null;
    }

    function getTilePosition(index) {
      if (index < LEFT_COLUMN_COUNT) {
        return {
          left: LAYOUT.leftX,
          top: LAYOUT.startY + (index * LAYOUT.rowStep)
        };
      }

      const rightIndex = index - LEFT_COLUMN_COUNT;
      return {
        left: LAYOUT.rightX,
        top: LAYOUT.startY + (rightIndex * LAYOUT.rowStep)
      };
    }

    function buildMetaLine(entry) {
      return `${formatTime12Hour(entry.start_time)} @ ${entry.location_name}`;
    }

    function scheduleLineSwap(lineSlot) {
      const showDescription = () => {
        lineSlot.classList.remove('show-meta');
        lineSlot.classList.add('show-description');
      };

      const showMeta = () => {
        lineSlot.classList.remove('show-description');
        lineSlot.classList.add('show-meta');
      };

      const first = setTimeout(() => {
        showDescription();

        const second = setTimeout(() => {
          showMeta();
          scheduleLineSwap(lineSlot);
        }, DESC_HOLD_MS + 380);

        state.lineTimerIds.push(second);
      }, META_HOLD_MS);

      state.lineTimerIds.push(first);
    }

    function createProgramTile(entry, index) {
      const tile = document.createElement('article');
      tile.className = 'program-tile';
      tile.dataset.entryId = entry.id;

      if (entry.is_active) {
        tile.classList.add('active');
      }

      const position = getTilePosition(index);
      tile.style.left = `${position.left}px`;
      tile.style.top = `${position.top}px`;
      tile.style.background = hexToRgba(entry.hex_color, TILE_OPACITY);
      tile.style.transition = `left ${TRANSITION_DURATION_MS}ms ease, top ${TRANSITION_DURATION_MS}ms ease, opacity ${TRANSITION_DURATION_MS}ms ease, transform ${TRANSITION_DURATION_MS}ms ease`;

      const iconRegion = document.createElement('div');
      iconRegion.className = 'program-icon';

      if (entry.icon_path) {
        const img = document.createElement('img');
        img.src = entry.icon_path;
        img.alt = '';
        img.loading = 'eager';
        iconRegion.appendChild(img);
      }

      const content = document.createElement('div');
      content.className = 'program-content';

      const title = document.createElement('div');
      title.className = 'program-title';
      title.textContent = entry.title || 'Untitled Program';

      const lineSlot = document.createElement('div');
      lineSlot.className = 'program-line-slot show-meta';

      const meta = document.createElement('div');
      meta.className = 'program-meta';
      meta.textContent = buildMetaLine(entry);

      const description = document.createElement('div');
      description.className = 'program-description';
      description.textContent = entry.description || '';

      lineSlot.appendChild(meta);
      lineSlot.appendChild(description);

      content.appendChild(title);
      content.appendChild(lineSlot);

      const debug = document.createElement('div');
      debug.className = 'tile-debug';
      debug.textContent = entry.location_key || '';

      tile.appendChild(iconRegion);
      tile.appendChild(content);
      tile.appendChild(debug);

      if (entry.description) {
        scheduleLineSwap(lineSlot);
      }

      return tile;
    }

    function updateTileContent(tile, entry) {
      tile.classList.toggle('active', !!entry.is_active);
      tile.style.background = hexToRgba(entry.hex_color, TILE_OPACITY);

      const title = tile.querySelector('.program-title');
      const meta = tile.querySelector('.program-meta');
      const description = tile.querySelector('.program-description');
      const img = tile.querySelector('.program-icon img');
      const lineSlot = tile.querySelector('.program-line-slot');

      if (title) {
        title.textContent = entry.title || 'Untitled Program';
      }

      if (meta) {
        meta.textContent = buildMetaLine(entry);
      }

      if (description) {
        description.textContent = entry.description || '';
      }

      if (img && entry.icon_path && img.getAttribute('src') !== entry.icon_path) {
        img.setAttribute('src', entry.icon_path);
      }

      if (lineSlot) {
        lineSlot.classList.remove('show-description');
        lineSlot.classList.add('show-meta');
        if (entry.description) {
          scheduleLineSwap(lineSlot);
        }
      }
    }

    function reconcileVisibleEntries(newVisibleEntries) {
      clearLineTimers();

      const oldMap = new Map(state.visibleEntries.map((entry) => [entry.id, entry]));
      const newMap = new Map(newVisibleEntries.map((entry) => [entry.id, entry]));

      const oldIds = new Set(oldMap.keys());
      const newIds = new Set(newMap.keys());

      const exitingIds = [...oldIds].filter((id) => !newIds.has(id));
      const enteringIds = [...newIds].filter((id) => !oldIds.has(id));
      const stayingIds = [...newIds].filter((id) => oldIds.has(id));

      exitingIds.forEach((id) => {
        const tile = state.tileElementsById.get(id);
        if (!tile) return;

        tile.style.opacity = '0';
        tile.style.transform = 'translateX(-60px)';

        setTimeout(() => {
          tile.remove();
          state.tileElementsById.delete(id);
        }, TRANSITION_DURATION_MS + 40);
      });

      newVisibleEntries.forEach((entry, index) => {
        const position = getTilePosition(index);
        const existingTile = state.tileElementsById.get(entry.id);

        if (existingTile) {
          updateTileContent(existingTile, entry);
          existingTile.style.left = `${position.left}px`;
          existingTile.style.top = `${position.top}px`;
          existingTile.style.opacity = '1';
          existingTile.style.transform = 'translateX(0)';
        } else {
          const tile = createProgramTile(entry, index);

          if (index >= LEFT_COLUMN_COUNT) {
            tile.style.opacity = '0';
            tile.style.transform = 'translateX(40px)';
          } else {
            tile.style.opacity = '0';
            tile.style.transform = 'translateY(10px)';
          }

          grid.appendChild(tile);
          state.tileElementsById.set(entry.id, tile);

          requestAnimationFrame(() => {
            tile.style.left = `${position.left}px`;
            tile.style.top = `${position.top}px`;
            tile.style.opacity = '1';
            tile.style.transform = 'translateX(0) translateY(0)';
          });
        }
      });

      state.visibleEntries = newVisibleEntries;
      showGrid();
    }

    function scheduleNextBoundary() {
      clearTransitionTimer();

      const nowMinutes = getCurrentMinutesInVancouver();
      const nextBoundary = getNextBoundaryMinutes(state.visibleEntries, nowMinutes);

      if (nextBoundary === null) {
        return;
      }

      const msUntilBoundary = getMillisecondsUntilVancouverMinute(nextBoundary) + BOUNDARY_FUDGE_MS;

      state.transitionTimerId = setTimeout(() => {
        refreshVisibleQueue();
      }, msUntilBoundary);
    }

    function refreshVisibleQueue() {
      const nowMinutes = getCurrentMinutesInVancouver();
      const newVisibleEntries = getVisibleEntries(state.allEntries, nowMinutes);

      if (!newVisibleEntries.length) {
        showStatus('No programs scheduled today');
        return;
      }

      reconcileVisibleEntries(newVisibleEntries);
      scheduleNextBoundary();
    }

    async function initialize() {
      showStatus('Loading program schedule...');

      const today = getTodayInVancouver();

      const [locationStylesResult, liveScheduleResult] = await Promise.all([
        loadLocationStyles(),
        loadLiveScheduleForDate(today)
      ]);

      if (locationStylesResult.error) {
        console.error('Error loading location styles:', locationStylesResult.error);
        showStatus('Schedule unavailable');
        return;
      }

      if (liveScheduleResult.error) {
        console.error('Error loading live schedule:', liveScheduleResult.error);
        showStatus('Schedule unavailable');
        return;
      }

      state.locationStyles = locationStylesResult.data || [];
      state.liveSchedule = liveScheduleResult.data || null;

      if (!state.liveSchedule || !Array.isArray(state.liveSchedule.entries_json)) {
        showStatus('No programs scheduled today');
        return;
      }

      state.allEntries = prepareRenderableEntries(
        state.liveSchedule.entries_json,
        state.locationStyles
      );

      const nowMinutes = getCurrentMinutesInVancouver();
      const initialVisibleEntries = getVisibleEntries(state.allEntries, nowMinutes);

      if (!initialVisibleEntries.length) {
        showStatus('No programs scheduled today');
        return;
      }

      grid.innerHTML = '';
      state.tileElementsById.clear();
      initialVisibleEntries.forEach((entry, index) => {
        const tile = createProgramTile(entry, index);
        grid.appendChild(tile);
        state.tileElementsById.set(entry.id, tile);
      });

      state.visibleEntries = initialVisibleEntries;
      showGrid();
      scheduleNextBoundary();
    }

    document.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
