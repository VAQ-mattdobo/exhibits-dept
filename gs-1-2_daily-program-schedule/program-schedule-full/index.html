<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, initial-scale=1.0" />
  <title>VAQ Program Schedule Full</title>

  <style>
    @font-face {
      font-display: swap;
      font-family: 'BlissPro';
      font-style: normal;
      font-weight: 700;
      src:
        url('../assets/BlissPro-Bold.woff2') format('woff2'),
        url('../assets/BlissPro-Bold.woff') format('woff');
    }

    @font-face {
      font-display: swap;
      font-family: 'BlissPro';
      font-style: italic;
      font-weight: 400;
      src:
        url('../assets/BlissPro-Italic.woff2') format('woff2'),
        url('../assets/BlissPro-Italic.woff') format('woff');
    }

    :root {
      --page-width: 1920px;
      --page-height: 810px;

      --outer-padding-x: 20px;
      --outer-padding-y: 20px;

      --tile-width: 930px;
      --tile-height: 138px;

      --border-radius: 13px;
      --inner-stroke: rgba(255, 255, 255, 0.10);
      --divider-color: rgba(0, 0, 0, 0.10);

      --icon-column-width: 154px;
      --icon-max-width: 154px;
      --icon-max-height: 95px;

      --tile-opacity: 0.80;

      --title-color: rgba(255, 255, 255, 0.98);
      --meta-color: rgba(255, 255, 255, 0.92);
      --description-color: rgba(255, 255, 255, 0.94);

      --active-title-color: #fff7b2;
      --active-meta-color: #fff4a3;
      --active-description-color: #fff8c9;

      --page-fallback: #113466;
      --status-bg: rgba(0, 0, 0, 0.22);
      --status-text: #ffffff;

      --page-fade-duration: 450ms;
      --line-fade-duration: 380ms;
      --meta-hold-ms: 3200;
      --desc-hold-ms: 3200;
      --page-rotation-ms: 9000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: var(--page-width);
      height: var(--page-height);
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--page-fallback);
    }

    body {
      position: relative;
      font-family: 'BlissPro', Arial, sans-serif;
      color: #fff;
    }

    .page {
      position: relative;
      width: var(--page-width);
      height: var(--page-height);
      overflow: hidden;
      background: var(--page-fallback);
    }

    .bg-rotator {
      position: absolute;
      width: 5000px;
      height: 5000px;
      top: -2095px;
      left: -1732px;
      background-image: url('../assets/RotCircAnim_5000x5000.jpg');
      background-repeat: no-repeat;
      background-size: 5000px 5000px;
      transform-origin: center center;
      animation: slowRotate 200s linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    .content-layer {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      padding: var(--outer-padding-y) var(--outer-padding-x);
    }

    .status-panel {
      position: absolute;
      inset: 20px;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      border-radius: 18px;
      background: var(--status-bg);
      color: var(--status-text);
      font-size: 40px;
      font-weight: 700;
      line-height: 1.15;
    }

    .status-panel[hidden],
    .grid[hidden] {
      display: none !important;
    }

    .grid {
      position: relative;
      width: 100%;
      height: 100%;
      opacity: 1;
      transition: opacity var(--page-fade-duration) ease;
    }

    .grid.is-fading {
      opacity: 0;
    }

    .program-tile {
      position: absolute;
      width: var(--tile-width);
      height: var(--tile-height);
      border-radius: var(--border-radius);
      overflow: hidden;
      display: grid;
      grid-template-columns: var(--icon-column-width) 1fr;
      box-shadow:
        inset 0 0 0 8px var(--inner-stroke),
        0 8px 18px rgba(0, 0, 0, 0.16);
      opacity: 0;
      transform: translateY(8px);
      animation: tileEnter 380ms ease-out forwards;
    }

    .program-tile::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.25) 0%,
          rgba(0, 0, 0, 0.12) 18%,
          rgba(0, 0, 0, 0.00) 42%
        );
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: multiply;
    }

    .program-tile.active {
      box-shadow:
        inset 0 0 0 8px rgba(255, 255, 255, 0.18),
        0 10px 26px rgba(0, 0, 0, 0.22);
    }

    .program-icon {
      position: relative;
      z-index: 2;
      width: var(--icon-column-width);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 12px;
      border-right: 2px solid var(--divider-color);
    }

    .program-icon img {
      display: block;
      max-width: var(--icon-max-width);
      max-height: var(--icon-max-height);
      width: auto;
      height: auto;
      transform-origin: center center;
    }

    .program-tile.active .program-icon img {
      animation: activeIconPulse 3.4s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(0, 0, 0, 0.10));
    }

    .program-content {
      position: relative;
      z-index: 2;
      min-width: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 12px 24px 12px 22px;
    }

    .program-title {
      font-size: 35px;
      font-weight: 700;
      line-height: 1.08;
      color: var(--title-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: -2px;
      margin-bottom: 6px;
      padding-bottom: 4px;
    }

    .program-tile.active .program-title {
      color: var(--active-title-color);
    }

    .program-line-slot {
      position: relative;
      height: 34px;
      min-height: 34px;
      overflow: hidden;
    }

    .program-meta,
    .program-description {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      font-size: 28px;
      font-style: italic;
      font-weight: 400;
      line-height: 1.12;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transform: translateY(4px);
      transition:
        opacity var(--line-fade-duration) ease,
        transform var(--line-fade-duration) ease;
      pointer-events: none;
    }

    .program-meta {
      color: var(--meta-color);
    }

    .program-description {
      color: var(--description-color);
      font-size: 23px;
      line-height: 1.18;
    }

    .program-tile.active .program-meta {
      color: var(--active-meta-color);
    }

    .program-tile.active .program-description {
      color: var(--active-description-color);
    }

    .program-line-slot.show-meta .program-meta {
      opacity: 1;
      transform: translateY(0);
    }

    .program-line-slot.show-description .program-description {
      opacity: 1;
      transform: translateY(0);
    }

    .tile-debug {
      position: absolute;
      right: 12px;
      bottom: 10px;
      font-size: 14px;
      line-height: 1;
      opacity: 0.22;
      pointer-events: none;
      z-index: 2;
      display: none;
    }

    @keyframes slowRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes activeIconPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes tileEnter {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="bg-rotator" aria-hidden="true"></div>

    <div class="content-layer">
      <div id="status-panel" class="status-panel" hidden></div>
      <div id="grid" class="grid" hidden></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://csxuuwbtxgdpvskggcux.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_jPeweysUr7DZvFxG7F1-LQ_UR8MT1F9';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const PAGE_SIZE = 10;
    const LEFT_COLUMN_COUNT = 5;
    const TIMEZONE_NAME = 'America/Vancouver';
    const TILE_OPACITY = 0.80;

    const META_HOLD_MS = 3200;
    const DESC_HOLD_MS = 3200;
    const PAGE_ROTATION_MS = 9000;

    const LAYOUT = {
      leftX: 0,
      rightX: 950,
      startY: 0,
      rowStep: 156
    };

    const state = {
      locationStyles: [],
      liveSchedule: null,
      renderedEntries: [],
      pages: [],
      currentPageIndex: 0,
      pageTimerId: null,
      lineTimerIds: []
    };

    const statusPanel = document.getElementById('status-panel');
    const grid = document.getElementById('grid');

    function clearLineTimers() {
      state.lineTimerIds.forEach((id) => clearTimeout(id));
      state.lineTimerIds = [];
    }

    function clearPageTimer() {
      if (state.pageTimerId) {
        clearTimeout(state.pageTimerId);
        state.pageTimerId = null;
      }
    }

    function showStatus(message) {
      clearLineTimers();
      clearPageTimer();
      statusPanel.hidden = false;
      statusPanel.textContent = message;
      grid.hidden = true;
      grid.innerHTML = '';
    }

    function showGrid() {
      statusPanel.hidden = true;
      grid.hidden = false;
    }

    function getTodayInVancouver() {
      const formatter = new Intl.DateTimeFormat('en-CA', {
        timeZone: TIMEZONE_NAME,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      });
      return formatter.format(new Date());
    }

    function getCurrentMinutesInVancouver() {
      const formatter = new Intl.DateTimeFormat('en-GB', {
        timeZone: TIMEZONE_NAME,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });

      const parts = formatter.formatToParts(new Date());
      const hour = Number(parts.find((p) => p.type === 'hour')?.value ?? '0');
      const minute = Number(parts.find((p) => p.type === 'minute')?.value ?? '0');

      return (hour * 60) + minute;
    }

    function formatTime12Hour(hhmm) {
      if (!hhmm || !/^\d{2}:\d{2}$/.test(hhmm)) return '';

      const [rawHours, rawMinutes] = hhmm.split(':').map(Number);
      const suffix = rawHours >= 12 ? 'p.m.' : 'a.m.';
      const hour12 = rawHours % 12 === 0 ? 12 : rawHours % 12;
      const minutes = String(rawMinutes).padStart(2, '0');

      return `${hour12}:${minutes} ${suffix}`;
    }

    function parseTimeToMinutes(timeString) {
      if (!timeString || !/^\d{2}:\d{2}$/.test(timeString)) return null;

      const [hours, minutes] = timeString.split(':').map(Number);

      if (
        Number.isNaN(hours) ||
        Number.isNaN(minutes) ||
        hours < 0 || hours > 23 ||
        minutes < 0 || minutes > 59
      ) {
        return null;
      }

      return (hours * 60) + minutes;
    }

    function normalizeHexColor(hex) {
      if (!hex) return '';
      const trimmed = String(hex).trim();
      return /^#[0-9a-fA-F]{6}$/.test(trimmed) ? trimmed : '';
    }

    function hexToRgba(hex, alpha) {
      const normalized = normalizeHexColor(hex);
      if (!normalized) {
        return `rgba(68, 102, 136, ${alpha})`;
      }

      const r = parseInt(normalized.slice(1, 3), 16);
      const g = parseInt(normalized.slice(3, 5), 16);
      const b = parseInt(normalized.slice(5, 7), 16);

      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function buildLocationMap(locationStyles) {
      const map = {};
      for (const item of locationStyles) {
        map[item.location_key] = item;
      }
      return map;
    }

    function buildIconPath(locationStyle) {
      if (!locationStyle) return '';
      const key = String(locationStyle.location_key || '').trim();
      if (!key) return '';
      return `./assets/icons/${key}.svg`;
    }

    async function loadLocationStyles() {
      const { data, error } = await supabaseClient
        .from('program_location_styles')
        .select('*')
        .eq('is_active', true)
        .order('sort_order', { ascending: true });

      return { data, error };
    }

    async function loadLiveScheduleForDate(scheduleDate) {
      const { data, error } = await supabaseClient
        .from('program_schedule_sets')
        .select('*')
        .eq('schedule_date', scheduleDate)
        .eq('mode', 'live')
        .maybeSingle();

      return { data, error };
    }

    function prepareRenderableEntries(entries, locationStyles) {
      const locationMap = buildLocationMap(locationStyles);
      const nowMinutes = getCurrentMinutesInVancouver();

      return (Array.isArray(entries) ? entries : [])
        .filter((entry) => !entry.is_cancelled)
        .map((entry) => {
          const location = locationMap[entry.location_key] || null;
          const startMinutes = parseTimeToMinutes(entry.start_time);
          const endMinutes = parseTimeToMinutes(entry.end_time);
          const descriptionText = String(entry.description || '').trim();

          return {
            id: entry.id || '',
            title: entry.title || '',
            start_time: entry.start_time || '',
            end_time: entry.end_time || '',
            description: descriptionText,
            location_key: entry.location_key || '',
            location_name: location?.display_name || entry.location_key || 'Unknown location',
            icon_path: buildIconPath(location),
            hex_color: normalizeHexColor(location?.hex_color) || '#446688',
            is_active:
              startMinutes !== null &&
              endMinutes !== null &&
              nowMinutes >= startMinutes &&
              nowMinutes < endMinutes
          };
        })
        .sort((a, b) => {
          const aMinutes = parseTimeToMinutes(a.start_time);
          const bMinutes = parseTimeToMinutes(b.start_time);

          if (aMinutes === null && bMinutes === null) return 0;
          if (aMinutes === null) return 1;
          if (bMinutes === null) return -1;
          if (aMinutes !== bMinutes) return aMinutes - bMinutes;

          const aEnd = parseTimeToMinutes(a.end_time);
          const bEnd = parseTimeToMinutes(b.end_time);

          if (aEnd === null && bEnd === null) return 0;
          if (aEnd === null) return 1;
          if (bEnd === null) return -1;
          return aEnd - bEnd;
        });
    }

    function paginateEntries(entries, pageSize) {
      const pages = [];
      for (let i = 0; i < entries.length; i += pageSize) {
        pages.push(entries.slice(i, i + pageSize));
      }
      return pages;
    }

    function getTilePosition(index) {
      if (index < LEFT_COLUMN_COUNT) {
        return {
          left: LAYOUT.leftX,
          top: LAYOUT.startY + (index * LAYOUT.rowStep)
        };
      }

      const rightIndex = index - LEFT_COLUMN_COUNT;
      return {
        left: LAYOUT.rightX,
        top: LAYOUT.startY + (rightIndex * LAYOUT.rowStep)
      };
    }

    function buildMetaLine(entry) {
      return `${formatTime12Hour(entry.start_time)} @ ${entry.location_name}`;
    }

    function createProgramTile(entry, index) {
      const tile = document.createElement('article');
      tile.className = 'program-tile';

      if (entry.is_active) {
        tile.classList.add('active');
      }

      const position = getTilePosition(index);
      tile.style.left = `${position.left}px`;
      tile.style.top = `${position.top}px`;
      tile.style.background = hexToRgba(entry.hex_color, TILE_OPACITY);
      tile.style.animationDelay = `${index * 35}ms`;

      const iconRegion = document.createElement('div');
      iconRegion.className = 'program-icon';

      if (entry.icon_path) {
        const img = document.createElement('img');
        img.src = entry.icon_path;
        img.alt = '';
        img.loading = 'eager';
        iconRegion.appendChild(img);
      }

      const content = document.createElement('div');
      content.className = 'program-content';

      const title = document.createElement('div');
      title.className = 'program-title';
      title.textContent = entry.title || 'Untitled Program';

      const lineSlot = document.createElement('div');
      lineSlot.className = 'program-line-slot show-meta';

      const meta = document.createElement('div');
      meta.className = 'program-meta';
      meta.textContent = buildMetaLine(entry);

      const description = document.createElement('div');
      description.className = 'program-description';
      description.textContent = entry.description || '';

      lineSlot.appendChild(meta);
      lineSlot.appendChild(description);

      content.appendChild(title);
      content.appendChild(lineSlot);

      const debug = document.createElement('div');
      debug.className = 'tile-debug';
      debug.textContent = entry.location_key || '';

      tile.appendChild(iconRegion);
      tile.appendChild(content);
      tile.appendChild(debug);

      if (entry.description) {
        scheduleLineSwap(lineSlot);
      }

      return tile;
    }

    function scheduleLineSwap(lineSlot) {
      const showDescription = () => {
        lineSlot.classList.remove('show-meta');
        lineSlot.classList.add('show-description');
      };

      const showMeta = () => {
        lineSlot.classList.remove('show-description');
        lineSlot.classList.add('show-meta');
      };

      const first = setTimeout(() => {
        showDescription();

        const second = setTimeout(() => {
          showMeta();
          scheduleLineSwap(lineSlot);
        }, DESC_HOLD_MS + 380);

        state.lineTimerIds.push(second);
      }, META_HOLD_MS);

      state.lineTimerIds.push(first);
    }

    function fadeGridOut() {
      return new Promise((resolve) => {
        grid.classList.add('is-fading');
        window.setTimeout(resolve, 460);
      });
    }

    function renderPage(pageEntries) {
      clearLineTimers();
      grid.innerHTML = '';

      pageEntries.forEach((entry, index) => {
        grid.appendChild(createProgramTile(entry, index));
      });

      grid.classList.remove('is-fading');
      showGrid();
    }

    function scheduleNextPage() {
      clearPageTimer();

      if (state.pages.length <= 1) {
        return;
      }

      state.pageTimerId = setTimeout(async () => {
        await fadeGridOut();

        state.currentPageIndex = (state.currentPageIndex + 1) % state.pages.length;
        renderPage(state.pages[state.currentPageIndex]);
        scheduleNextPage();
      }, PAGE_ROTATION_MS);
    }

    function renderSchedule(entries) {
      if (!entries.length) {
        showStatus('No programs scheduled today');
        return;
      }

      state.pages = paginateEntries(entries, PAGE_SIZE);
      state.currentPageIndex = 0;

      renderPage(state.pages[0]);
      scheduleNextPage();
    }

    async function initialize() {
      showStatus('Loading program schedule...');

      const today = getTodayInVancouver();

      const [locationStylesResult, liveScheduleResult] = await Promise.all([
        loadLocationStyles(),
        loadLiveScheduleForDate(today)
      ]);

      if (locationStylesResult.error) {
        console.error('Error loading location styles:', locationStylesResult.error);
        showStatus('Schedule unavailable');
        return;
      }

      if (liveScheduleResult.error) {
        console.error('Error loading live schedule:', liveScheduleResult.error);
        showStatus('Schedule unavailable');
        return;
      }

      state.locationStyles = locationStylesResult.data || [];
      state.liveSchedule = liveScheduleResult.data || null;

      if (!state.liveSchedule || !Array.isArray(state.liveSchedule.entries_json)) {
        showStatus('No programs scheduled today');
        return;
      }

      state.renderedEntries = prepareRenderableEntries(
        state.liveSchedule.entries_json,
        state.locationStyles
      );

      renderSchedule(state.renderedEntries);
    }

    document.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
